[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Do NOT declare @netlify/plugin-nextjs here.
# Netlify auto-installs "Essential Next.js" for Next.js projects and manages
# static asset routing, edge functions, and ISR automatically.
# Declaring the plugin manually causes a version conflict that breaks
# /_next/static/* routing (all assets 404 with text/html).

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Redirect /docs to GitBook
[[redirects]]
  from = "/docs"
  to = "https://seedcoin.gitbook.io/seedcoin"
  status = 302
  force = true
